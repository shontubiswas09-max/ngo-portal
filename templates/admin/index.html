{% extends "admin/index.html" %}

{% block content_title %}
    <h1>{{ site_title|default:_('Django administration') }}</h1>
{% endblock %}

{% block content %}
    {% if dashboard_url %}
    <div style="margin-bottom: 20px;">
        <a href="{{ dashboard_url }}" style="display: inline-block; padding: 10px 20px; background-color: #417690; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 14px;">
            <i class="fas fa-chart-line"></i> Go to Dashboard
        </a>
    </div>
    {% endif %}
    
    {{ block.super }}
{% endblock %}
