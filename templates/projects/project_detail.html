{% extends 'base.html' %}

{% block title %}{{ project.name }} - Project Details{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <!-- Main content -->
        <main class="col-12 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">{{ project.name }}</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    {% if user.is_authenticated %}
                    <a href="{% url 'projects:edit_project' project.id %}" class="btn btn-sm btn-outline-secondary">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                    {% endif %}
                    <a href="{% url 'projects:project_list' %}" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-arrow-left"></i> Back to List
                    </a>
                </div>
            </div>

            <div class="row">
                <div class="col-md-8">
                    <div class="card">
                        {% if project.image %}
                        <img src="{{ project.image.url }}" class="card-img-top" alt="{{ project.name }}">
                        {% endif %}
                        <div class="card-body">
                            <h5 class="card-title">{{ project.name }}</h5>
                            <p class="card-text">{{ project.description }}</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
{% endblock %}
